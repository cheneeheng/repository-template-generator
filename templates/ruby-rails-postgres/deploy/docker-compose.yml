services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: {{PROJECT_NAME}}_development
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "3000:3000"
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db/{{PROJECT_NAME}}_production
    depends_on:
      - db
    command: >
      bash -c "bundle exec rails db:migrate && bundle exec puma -C config/puma.rb"

volumes:
  pg_data:
