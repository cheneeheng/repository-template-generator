services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: {{PROJECT_NAME}}_dev
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "4000:4000"
    env_file: ../.env
    environment:
      DATABASE_URL: ecto://postgres:postgres@db/{{PROJECT_NAME}}_prod
    depends_on:
      - db

volumes:
  pg_data:
