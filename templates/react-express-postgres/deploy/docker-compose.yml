services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://app:secret@db:5432/{{PROJECT_NAME}}
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "{{PROJECT_NAME}}"
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
