services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:8080"
    env_file: ../.env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

volumes:
  redis_data:
